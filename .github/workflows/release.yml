name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Run tests
        run: pytest tests/unit tests/integration
        
      - name: Build Docker image
        run: docker build -t ${{ github.repository }}:${{ github.ref_name }} .
        
      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Push Docker image
        run: |
          docker tag ${{ github.repository }}:${{ github.ref_name }} ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
          docker tag ${{ github.repository }}:${{ github.ref_name }} ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:latest
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true 