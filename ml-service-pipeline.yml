name: ML Service Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.9"
  CUDA_VERSION: "11.8"
  MODEL_CACHE_DIR: "/tmp/model_cache"

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Run linting
        run: |
          flake8 app/
          black --check app/
          mypy app/
          
      - name: Run security checks
        run: |
          bandit -r app/
          safety check

  unit-tests:
    name: Unit Tests
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          
      - name: Run unit tests
        run: |
          pytest tests/unit/ --cov=app --cov-report=xml
          
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      prometheus:
        image: prom/prometheus
        ports:
          - 9090:9090
          
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install CUDA
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-ubuntu2004.pin
          sudo mv cuda-ubuntu2004.pin /etc/apt/preferences.d/cuda-repository-pin-600
          sudo apt-key adv --fetch-keys https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/3bf863cc.pub
          sudo add-apt-repository "deb https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/ /"
          sudo apt-get update
          sudo apt-get -y install cuda-${{ env.CUDA_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          
      - name: Run integration tests
        run: |
          pytest tests/integration/ --log-cli-level=INFO
        env:
          REDIS_URL: redis://localhost:6379
          PROMETHEUS_URL: http://localhost:9090

  model-tests:
    name: Model Validation Tests
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache models
        uses: actions/cache@v3
        with:
          path: ${{ env.MODEL_CACHE_DIR }}
          key: ${{ runner.os }}-models-${{ hashFiles('app/config/models.yaml') }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          
      - name: Run model tests
        run: |
          pytest tests/models/ --log-cli-level=INFO
        env:
          MODEL_CACHE_DIR: ${{ env.MODEL_CACHE_DIR }}
          
      - name: Test model optimization
        run: |
          python scripts/test_model_optimization.py
          
      - name: Validate model metrics
        run: |
          python scripts/validate_model_metrics.py

  performance-tests:
    name: Performance Tests
    needs: model-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install locust
          
      - name: Run load tests
        run: |
          locust -f tests/performance/locustfile.py --headless -u 100 -r 10 --run-time 5m
          
      - name: Run stress tests
        run: |
          python tests/performance/stress_test.py
          
      - name: Generate performance report
        run: |
          python scripts/generate_performance_report.py

  build-and-push:
    name: Build and Push Image
    needs: [performance-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
          
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/ml-service:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/ml-service:latest
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/ml-service:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/ml-service:buildcache,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
          
      - name: Deploy to Kubernetes
        run: |
          # Update image tag
          kubectl set image deployment/ml-service ml-service=${{ secrets.REGISTRY_URL }}/ml-service:${{ github.sha }}
          
          # Monitor rollout
          kubectl rollout status deployment/ml-service -n production --timeout=5m
          
      - name: Run smoke tests
        run: |
          python tests/smoke/test_deployment.py
        env:
          SERVICE_URL: ${{ secrets.PRODUCTION_URL }}
          
      - name: Monitor deployment
        run: |
          python scripts/monitor_deployment.py --duration 15m
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }} 